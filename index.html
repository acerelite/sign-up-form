<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <div class="logo-container">
        <img src="Assets/logo_brunoanjopro.png" alt="logo" />
        <span>ODIN</span>
      </div>
    </div>
    <div class="login-screen">
      <div>
        <p>
          This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
          Sign up <em>now</em> to get started.          
        </p>
        <p>
          You <em>know</em> you want to
        </p>
      </div>

      <div>
        <form action="" method="post" id="regForm">
          <div class="form-container">
            <div>
              <h2>Let's do this!</h2>
            </div>
            <div class="input-body">
              <div>
                <label for="first_name">FIRST NAME</label>
                <div>
                  <input
                    type="text"
                    id="first_name"
                    name="first_name"
                    minlength="1"
                    maxlength="20"
                    pattern="[A-Za-z]+"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
              <div>
                <label for="last_name">LAST NAME</label>
                <div>
                  <input
                    type="text"
                    id="last_name"
                    name="last_name"
                    minlength="1"
                    maxlength="20"
                    pattern="[A-Za-z]+"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
              <div>
                <label for="email">EMAIL</label>
                <div>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    minlength="1"
                    maxlength="20"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
              <div>
                <label for="phoneNum">PHONE NUMBER</label>
                <div>
                  <input
                    type="tel"
                    id="phoneNum"
                    name="phoneNum"
                    maxlength="11"
                    pattern="09\d{9}"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
              <div>
                <label for="password">PASSWORD</label>
                <div>
                  <input
                    class="pass"
                    type="password"
                    id="password"
                    name="password"
                    minlength="6"
                    maxlength="20"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
              <div>
                <label for="c_password">CONFIRM PASSWORD</label>
                <div>
                  <input
                    class="error"
                    type="password"
                    id="c_password"
                    minlength="6"
                    maxlength="20"
                    name="c_password"
                    placeholder=" "
                    required
                  />
                  <span></span>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>

      <div>
        <div>
          <button type="submit" form="regForm">Create Account</button>
        </div>
        <div>
          <p>Already have an account? <a href="">Sign in</a></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
